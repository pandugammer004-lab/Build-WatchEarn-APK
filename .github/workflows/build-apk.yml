name: Build WatchEarn APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'
          
      - name: Generate Flutter Android Folders
        run: flutter create --project-name watchearn --platforms=android .

      - name: Setup Firebase Files
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "Moved google-services.json to android/app/"
          else
            echo "Warning: google-services.json not found in root!"
          fi

      - name: Patch Android Files
        shell: python
        run: |
          import os
          import re

          # --- Patch android/build.gradle (root) ---
          root_gradle = 'android/build.gradle'
          if os.path.exists(root_gradle):
              with open(root_gradle, 'r') as f:
                  c = f.read()
              # Add Google Services classpath
              if 'com.google.gms:google-services' not in c:
                  c = c.replace(
                      'dependencies {',
                      "dependencies {\n        classpath 'com.google.gms:google-services:4.4.1'"
                  )
              # Update Kotlin version to fix incompatibility with google_mobile_ads
              c = re.sub(r"ext\.kotlin_version\s*=\s*'[^']*'", "ext.kotlin_version = '1.9.24'", c)
              with open(root_gradle, 'w') as f:
                  f.write(c)
              print("Patched android/build.gradle")

          # --- Patch android/app/build.gradle ---
          app_gradle = 'android/app/build.gradle'
          if os.path.exists(app_gradle):
              with open(app_gradle, 'r') as f:
                  c = f.read()
              # Add google-services plugin
              if 'com.google.gms.google-services' not in c:
                  c = c.replace(
                      "apply plugin: 'com.android.application'",
                      "apply plugin: 'com.android.application'\napply plugin: 'com.google.gms.google-services'"
                  )
              # Fix applicationId
              c = re.sub(r'applicationId\s+"[^"]*"', 'applicationId "nexa.web.solution1122"', c)
              # Fix namespace
              c = re.sub(r'namespace\s+"[^"]*"', 'namespace "nexa.web.solution1122"', c)
              # Fix minSdkVersion
              c = c.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 23')
              # Fix compileSdkVersion to 34
              c = c.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 34')
              with open(app_gradle, 'w') as f:
                  f.write(c)
              print("Patched android/app/build.gradle")

          # --- Patch AndroidManifest.xml (add AdMob APPLICATION_ID) ---
          manifest = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(manifest):
              with open(manifest, 'r') as f:
                  c = f.read()
              # Only add if not already present
              ADMOB_APP_ID = 'ca-app-pub-3940256099942544~3347511713'
              if 'com.google.android.gms.ads.APPLICATION_ID' not in c:
                  # Insert before </application>
                  meta_tag = '    <meta-data\n        android:name="com.google.android.gms.ads.APPLICATION_ID"\n        android:value="' + ADMOB_APP_ID + '"/>\n'
                  c = c.replace('</application>', meta_tag + '</application>')
                  with open(manifest, 'w') as f:
                      f.write(c)
                  print("Added AdMob APPLICATION_ID to AndroidManifest.xml")
              else:
                  print("AdMob APPLICATION_ID already present")

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WatchEarn-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
