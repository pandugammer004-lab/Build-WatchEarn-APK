name: Build WatchEarn APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Generate Flutter Android Folders
        run: flutter create --platforms=android .

      - name: Setup Firebase Files
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "Moved google-services.json to android/app/"
          else
            echo "Warning: google-services.json not found in root!"
          fi

      - name: Patch Gradle for Firebase (Kotlin DSL)
        run: |
          # Add google-services plugin to project build.gradle.kts
          sed -i 's/plugins {/plugins {\n    id("com.google.gms.google-services") version "4.4.1" apply false/' android/build.gradle.kts
          
          # Add google-services plugin to app build.gradle.kts
          sed -i 's/plugins {/plugins {\n    id("com.google.gms.google-services")/' android/app/build.gradle.kts
          
          # Increase minSdk to 23 for Firebase compatibility if needed
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: WatchEarn-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
