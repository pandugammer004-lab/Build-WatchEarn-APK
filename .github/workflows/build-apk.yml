name: Build WatchEarn APK + Web

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ─────────────── WEB BUILD → GitHub Pages ───────────────
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Generate Web Folder
        run: flutter create --project-name watchearn --platforms=web .

      - name: Inject Firebase JS SDK into index.html
        shell: python
        run: |
          import re
          with open('web/index.html', 'r') as f:
              html = f.read()

          firebase_scripts = """
          <!-- Firebase JS SDK -->
          <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
          <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
          <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
          <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
          <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
          <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics-compat.js"></script>
          <script>
            firebase.initializeApp({
              apiKey: "AIzaSyA9xQfWbNc1Ht99KXx5GMLIuk_wfItw9BA",
              authDomain: "mobile-app-f270c.firebaseapp.com",
              projectId: "mobile-app-f270c",
              storageBucket: "mobile-app-f270c.firebasestorage.app",
              messagingSenderId: "461764093304",
              appId: "1:461764093304:android:61891c996e598d1624d48d"
            });
          </script>"""

          html = html.replace('</head>', firebase_scripts + '\\n  </head>')
          with open('web/index.html', 'w') as f:
              f.write(html)
          print("Firebase JS SDK injected into index.html")

      - name: Build Web
        run: flutter build web --release --base-href "/Build-WatchEarn-APK/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  # ─────────────── APK BUILD ───────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'

      - name: Generate Flutter Android Folders
        run: flutter create --project-name watchearn --platforms=android .

      - name: Setup Firebase Files
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "google-services.json copied to android/app/"
          fi

      - name: Patch Android Files
        shell: python
        run: |
          import os, re

          # 1. Root settings.gradle (Flutter 3.16+)
          settings_gradle = 'android/settings.gradle'
          if os.path.exists(settings_gradle):
              with open(settings_gradle, 'r') as f: c = f.read()
              if 'com.google.gms.google-services' not in c:
                  c = re.sub(r'(id "com.android.application".*)', r'\1\n    id "com.google.gms.google-services" version "4.4.1" apply false', c)
                  with open(settings_gradle, 'w') as f: f.write(c)

          # 2. Root build.gradle (Pre-3.16)
          root_gradle = 'android/build.gradle'
          if os.path.exists(root_gradle):
              with open(root_gradle, 'r') as f: c = f.read()
              if 'com.google.gms:google-services' not in c and 'dependencies {' in c:
                  c = c.replace('dependencies {', "dependencies {\n        classpath 'com.google.gms:google-services:4.4.1'")
              c = re.sub(r"ext\.kotlin_version\s*=\s*'[^']*'", "ext.kotlin_version = '1.9.24'", c)
              with open(root_gradle, 'w') as f: f.write(c)

          # 3. App build.gradle
          app_gradle = 'android/app/build.gradle'
          if os.path.exists(app_gradle):
              with open(app_gradle, 'r') as f: c = f.read()
              
              # Handle new plugins block (Flutter 3.16+)
              if 'id "com.android.application"' in c and 'id "com.google.gms.google-services"' not in c:
                  c = c.replace('id "com.android.application"', 'id "com.android.application"\n    id "com.google.gms.google-services"')
              # Handle old apply plugin (Pre-3.16)
              elif "apply plugin: 'com.android.application'" in c and "apply plugin: 'com.google.gms.google-services'" not in c:
                  c = c.replace("apply plugin: 'com.android.application'", "apply plugin: 'com.android.application'\napply plugin: 'com.google.gms.google-services'")
              
              # Fix namespace and applicationId
              c = re.sub(r'applicationId\s+"[^"]*"', 'applicationId "nexa.web.solution1122"', c)
              c = re.sub(r'applicationId\s+=\s+"[^"]*"', 'applicationId = "nexa.web.solution1122"', c)
              c = re.sub(r'namespace\s+"[^"]*"', 'namespace "nexa.web.solution1122"', c)
              c = re.sub(r'namespace\s+=\s+"[^"]*"', 'namespace = "nexa.web.solution1122"', c)
              
              c = c.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 23')
              c = c.replace('minSdkVersion = flutter.minSdkVersion', 'minSdkVersion = 23')
              c = c.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 34')
              c = c.replace('compileSdkVersion = flutter.compileSdkVersion', 'compileSdkVersion = 34')
              
              with open(app_gradle, 'w') as f: f.write(c)

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WatchEarn-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
