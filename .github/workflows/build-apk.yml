name: Build WatchEarn APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Generate Flutter Android Folders
        run: flutter create --platforms=android .

      - name: Setup Firebase Files
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "Moved google-services.json to android/app/"
          else
            echo "Warning: google-services.json not found in root!"
          fi

      - name: Patch Gradle for Firebase (Kotlin DSL)
        shell: python
        run: |
          import os
          
          # Patch Project level
          p_file = 'android/build.gradle.kts'
          if os.path.exists(p_file):
              with open(p_file, 'r') as f: c = f.read()
              if 'com.google.gms.google-services' not in c:
                  if 'plugins {' in c:
                      c = c.replace('plugins {', 'plugins {\n    id("com.google.gms.google-services") version "4.4.1" apply false')
                  else:
                      c = 'plugins {\n    id("com.google.gms.google-services") version "4.4.1" apply false\n}\n' + c
                  with open(p_file, 'w') as f: f.write(c)
          
          # Patch App level
          a_file = 'android/app/build.gradle.kts'
          if os.path.exists(a_file):
              with open(a_file, 'r') as f: c = f.read()
              if 'com.google.gms.google-services' not in c:
                  if 'plugins {' in c:
                      c = c.replace('plugins {', 'plugins {\n    id("com.google.gms.google-services")')
                  else:
                      c = 'plugins {\n    id("com.google.gms.google-services")\n}\n' + c
                  c = c.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
                  with open(a_file, 'w') as f: f.write(c)

      - name: Get Dependencies
        run: flutter pub get

      - name: Fix Plugin AGP 8 Issues
        shell: python
        run: |
          import glob
          import os

          for path in glob.glob('/home/runner/.pub-cache/hosted/pub.dev/*/android/build.gradle'):
              if os.path.exists(path):
                  with open(path, 'r') as f: c = f.read()
                  
                  # Fix Proguard
                  c = c.replace("getDefaultProguardFile('proguard-android.txt')", "'proguard-android-optimize.txt'")
                  
                  # Fix Namespace
                  if 'namespace ' not in c and 'android {' in c:
                      c = c.replace('android {', 'android {\n    namespace "com.pichillilorenzo.flutter_inappwebview"\n', 1)
                      
                  # Fix Configurations.all
                  c = c.replace('configurations.all', 'configurations.configureEach')
                  
                  with open(path, 'w') as f: f.write(c)

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WatchEarn-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
