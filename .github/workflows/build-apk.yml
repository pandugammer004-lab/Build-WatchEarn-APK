name: Build WatchEarn APK + Web

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ─────────────── WEB BUILD → GitHub Pages ───────────────
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href "/Build-WatchEarn-APK/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  # ─────────────── APK BUILD ───────────────
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'

      - name: Generate Flutter Android Folders
        run: flutter create --project-name watchearn --platforms=android .

      - name: Setup Firebase Files
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "google-services.json copied to android/app/"
          fi

      - name: Patch Android Files
        shell: python
        run: |
          import os, re

          # Root build.gradle
          root_gradle = 'android/build.gradle'
          if os.path.exists(root_gradle):
              with open(root_gradle, 'r') as f: c = f.read()
              if 'com.google.gms:google-services' not in c:
                  c = c.replace('dependencies {', "dependencies {\n        classpath 'com.google.gms:google-services:4.4.1'")
              c = re.sub(r"ext\.kotlin_version\s*=\s*'[^']*'", "ext.kotlin_version = '1.9.24'", c)
              with open(root_gradle, 'w') as f: f.write(c)

          # App build.gradle
          app_gradle = 'android/app/build.gradle'
          if os.path.exists(app_gradle):
              with open(app_gradle, 'r') as f: c = f.read()
              if 'com.google.gms.google-services' not in c:
                  c = c.replace("apply plugin: 'com.android.application'", "apply plugin: 'com.android.application'\napply plugin: 'com.google.gms.google-services'")
              c = re.sub(r'applicationId\s+"[^"]*"', 'applicationId "nexa.web.solution1122"', c)
              c = re.sub(r'namespace\s+"[^"]*"', 'namespace "nexa.web.solution1122"', c)
              c = c.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 23')
              c = c.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 34')
              with open(app_gradle, 'w') as f: f.write(c)

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WatchEarn-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
