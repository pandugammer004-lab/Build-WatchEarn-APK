name: Build WatchEarn APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'
          
      - name: Generate Flutter Android Folders
        run: flutter create --project-name watchearn --platforms=android .

      - name: Setup Firebase Files
        run: |
          if [ -f "google-services.json" ]; then
            cp google-services.json android/app/
            echo "Moved google-services.json to android/app/"
          else
            echo "Warning: google-services.json not found in root!"
          fi

      - name: Patch Gradle for Firebase
        shell: python
        run: |
          import os
          
          # Groovy patching (Flutter 3.16 default)
          if os.path.exists('android/build.gradle'):
              with open('android/build.gradle', 'r') as f: c = f.read()
              if 'com.google.gms:google-services' not in c:
                  c = c.replace('dependencies {', "dependencies {\n        classpath 'com.google.gms:google-services:4.4.1'")
                  with open('android/build.gradle', 'w') as f: f.write(c)
                  
          if os.path.exists('android/app/build.gradle'):
              with open('android/app/build.gradle', 'r') as f: c = f.read()
              if 'com.google.gms.google-services' not in c:
                  c = c.replace("apply plugin: 'com.android.application'", "apply plugin: 'com.android.application'\napply plugin: 'com.google.gms.google-services'")
                  # Also increase minSdk and fix package name for Firebase
                  import re
                  c = re.sub(r'applicationId\s+".*"', 'applicationId "nexa.web.solution1122"', c)
                  c = re.sub(r'namespace\s+".*"', 'namespace "nexa.web.solution1122"', c)
                  c = c.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 23')
                  c = c.replace('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 34')
                  with open('android/app/build.gradle', 'w') as f: f.write(c)

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WatchEarn-App-APK
          path: build/app/outputs/flutter-apk/app-release.apk
