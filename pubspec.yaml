name: watchearn
description: Watch. Earn. Repeat. - A premium watch-and-earn mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.9
  firebase_analytics: ^10.8.0
  
  # Google Sign In
  google_sign_in: ^6.2.1
  
  # UI Components
  google_fonts: ^5.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  animate_do: ^3.1.2
  flutter_spinkit: ^5.2.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  confetti: ^0.7.0
  fl_chart: ^0.66.0
  flutter_fortune_wheel: ^1.3.1
  lottie: ^2.7.0
  
  # YouTube
  youtube_player_flutter: ^8.1.2
  
  # Ads - Re-enabled
  google_mobile_ads: ^5.1.0
  
  # State Management
  provider: ^6.1.1
  
  # In-App Purchase
  in_app_purchase: ^3.1.13
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utils
  connectivity_plus: ^5.0.2
  share_plus: ^7.2.1
  url_launcher: ^6.2.1
  package_info_plus: ^5.0.1
  intl: ^0.19.0
  uuid: ^4.2.2
  clipboard: ^0.1.3
  flutter_local_notifications: ^17.0.0
  path_provider: ^2.1.2
  qr_flutter: ^4.1.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.jpg"
  min_sdk_Android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
